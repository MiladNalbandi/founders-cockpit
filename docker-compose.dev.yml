services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cockpit
      POSTGRES_USER: cockpit
      POSTGRES_PASSWORD: cockpit
    ports: ["5442:5432"]
    volumes:
      - cockpit_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cockpit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6389:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cockpit_pg:
